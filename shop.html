<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | ÉLÉVATE</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Same navigation as index.html -->
    <nav class="navbar">
        <!-- Copy from index.html -->
    </nav>
    
    <!-- Shop Header -->
    <section class="page-header">
        <div class="container">
            <h1 class="fade-up">The Collection</h1>
            <p class="fade-up delay-1">Meticulously curated for the discerning</p>
        </div>
    </section>
    
    <!-- Shop Filters -->
    <section class="shop-filters">
        <div class="container">
            <div class="filter-bar">
                <div class="filter-group">
                    <button class="filter-btn active" data-category="all">All</button>
                    <button class="filter-btn" data-category="apparel">Apparel</button>
                    <button class="filter-btn" data-category="accessories">Accessories</button>
                    <button class="filter-btn" data-category="home">Home</button>
                </div>
                <div class="sort-group">
                    <select id="sort-select">
                        <option value="featured">Featured</option>
                        <option value="price-low">Price: Low to High</option>
                        <option value="price-high">Price: High to Low</option>
                        <option value="name-asc">Name: A to Z</option>
                    </select>
                </div>
            </div>
        </div>
    </section>
    
    <!-- Products Grid -->
    <section class="products-section">
        <div class="container">
            <div id="products-grid" class="products-grid"></div>
        </div>
    </section>
    
    <!-- Same footer as index.html -->
    <footer class="footer">
        <!-- Copy from index.html -->
    </footer>
    
    <!-- Cart Sidebar -->
    <!-- Copy from index.html -->
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/shop.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
