<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | DOLLARCHIC — Maison de Luxe</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,300;0,6..96,400;0,6..96,500;1,6..96,300;1,6..96,400&family=Cinzel:wght@300;400;500&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<style>
/* ═══════════════════════════════════════════════
   DOLLARCHIC — AUTH PAGES
   Philosophy: Liquid Gold · Dark Matter · Living Sculpture
   ═══════════════════════════════════════════════ */

:root {
  --void: #020406;
  --abyss: #050a0d;
  --deep: #080f14;
  --surface: #0c1820;
  --gold-0: #6b4a0f;
  --gold-1: #a87820;
  --gold-2: #d4a830;
  --gold-3: #f0c842;
  --gold-4: #f9e090;
  --gold-5: #fdf5d8;
  --bone: #f8f4ed;
  --ash: #8a8070;
  --error: #c44a2c;
  --success: #2a8a5c;

  --grad-gold: linear-gradient(105deg, #6b4a0f 0%, #d4a830 25%, #f9e090 50%, #d4a830 75%, #6b4a0f 100%);
  --grad-gold-sm: linear-gradient(135deg, #a87820, #f0c842, #a87820);

  --shadow-vast: 0 60px 120px -20px rgba(0,0,0,0.9);
  --shadow-gold: 0 0 80px rgba(212,168,48,0.2), 0 20px 60px rgba(212,168,48,0.1);
  --glow-gold: 0 0 30px rgba(240,200,66,0.4);

  --serif: 'Bodoni Moda', 'Didot', Georgia, serif;
  --display: 'Cinzel', 'Trajan Pro', serif;
  --sans: 'DM Sans', sans-serif;

  --ease-silk: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-film: cubic-bezier(0.77, 0, 0.175, 1);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: var(--sans);
  font-weight: 300;
  background: var(--void);
  color: var(--bone);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* ─── AMBIENT CANVAS ─── */
#ambient-canvas {
  position: fixed; inset: 0;
  z-index: 0; pointer-events: none;
  opacity: 0.6;
}

/* ─── NAVBAR ─── */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 1000; padding: 1.5rem 0;
  transition: all 0.6s var(--ease-silk);
  background: rgba(2,4,6,0.7);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(212,168,48,0.1);
}
.nav-inner {
  max-width: 1500px; margin: 0 auto;
  padding: 0 4rem;
  display: flex; align-items: center; justify-content: space-between;
}
.nav-logo {
  font-family: var(--display);
  font-size: 1.2rem; font-weight: 300;
  letter-spacing: 0.3em;
  color: var(--bone);
  text-decoration: none;
}
.nav-logo::before {
  content: '✦';
  color: var(--gold-3);
  margin-right: 0.5rem;
  animation: starPulse 2.5s ease-in-out infinite;
  display: inline-block;
}
@keyframes starPulse {
  0%,100% { opacity:1; transform: rotate(0deg) scale(1); }
  50% { opacity:0.7; transform: rotate(180deg) scale(0.8); }
}
.logo-tagline {
  display: block; font-family: var(--sans);
  font-size: 0.45rem; letter-spacing: 0.35em;
  color: rgba(212,168,48,0.5); margin-top: -0.1rem;
  text-align: right;
}
.nav-back {
  display: flex; align-items: center; gap: 0.75rem;
  color: rgba(248,244,237,0.5);
  text-decoration: none;
  font-family: var(--display);
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  transition: color 0.3s, gap 0.3s;
}
.nav-back i { font-size: 0.7rem; }
.nav-back:hover { color: var(--gold-3); gap: 1rem; }

/* ─── AUTH CONTAINER ─── */
.auth-container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 8rem 2rem 4rem;
  position: relative;
  z-index: 1;
}
.auth-card {
  max-width: 520px;
  width: 100%;
  background: rgba(8, 9, 14, 0.65);
  backdrop-filter: blur(24px);
  border: 1px solid rgba(212,168,48,0.15);
  padding: 3rem 2.5rem;
  position: relative;
  transition: all 0.5s var(--ease-silk);
}
.auth-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--grad-gold);
  animation: barShimmer 3s ease infinite;
  background-size: 200% 100%;
}
.auth-card::after {
  content: '✦';
  position: absolute;
  bottom: 1.5rem;
  right: 1.5rem;
  font-size: 0.7rem;
  color: var(--gold-2);
  opacity: 0.3;
  animation: cornerPulse 3s ease-in-out infinite alternate;
}
@keyframes barShimmer {
  0%,100% { background-position: 0% 0; }
  50% { background-position: 100% 0; }
}
@keyframes cornerPulse {
  from { opacity: 0.2; transform: scale(0.8) rotate(0deg); }
  to { opacity: 0.6; transform: scale(1.2) rotate(180deg); }
}

.auth-header {
  text-align: center;
  margin-bottom: 2.5rem;
}
.auth-icon {
  width: 70px;
  height: 70px;
  margin: 0 auto 1.5rem;
  border: 1px solid rgba(212,168,48,0.3);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(212,168,48,0.03);
}
.auth-icon i {
  font-size: 2rem;
  color: var(--gold-2);
}
.auth-header h1 {
  font-family: var(--serif);
  font-size: 2rem;
  font-weight: 300;
  letter-spacing: -0.02em;
  margin-bottom: 0.5rem;
}
.auth-header p {
  font-family: var(--sans);
  font-size: 0.75rem;
  color: rgba(248,244,237,0.4);
  letter-spacing: 0.08em;
}

/* ─── FORM STYLES ─── */
.form-group {
  margin-bottom: 1.5rem;
}
.form-group label {
  display: block;
  font-family: var(--display);
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(212,168,48,0.6);
  margin-bottom: 0.6rem;
}
.input-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}
.input-wrapper i {
  position: absolute;
  left: 1rem;
  color: rgba(212,168,48,0.3);
  font-size: 0.85rem;
  pointer-events: none;
  z-index: 1;
}
.input-wrapper input {
  width: 100%;
  padding: 1rem 3rem 1rem 2.8rem;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(212,168,48,0.15);
  color: var(--bone);
  font-family: var(--sans);
  font-size: 0.85rem;
  transition: all 0.3s ease;
  outline: none;
}
.input-wrapper input:focus {
  border-color: rgba(212,168,48,0.5);
  background: rgba(255,255,255,0.06);
}
.input-wrapper input::placeholder {
  color: rgba(248,244,237,0.2);
  font-size: 0.7rem;
}

/* Password toggle - FIXED */
.password-toggle {
  position: absolute;
  right: 1rem;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: rgba(212,168,48,0.5);
  cursor: pointer;
  font-size: 1rem;
  transition: all 0.3s ease;
  z-index: 2;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.password-toggle:hover {
  color: var(--gold-3);
  background: rgba(212,168,48,0.1);
}

/* Form options */
.form-options {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2rem;
  font-size: 0.7rem;
  flex-wrap: wrap;
  gap: 1rem;
}
.remember-me {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  cursor: pointer;
}
.remember-me input {
  accent-color: var(--gold-2);
  width: 16px;
  height: 16px;
  cursor: pointer;
}
.remember-me span {
  color: rgba(248,244,237,0.5);
  letter-spacing: 0.05em;
}
.forgot-link {
  color: rgba(212,168,48,0.6);
  text-decoration: none;
  letter-spacing: 0.05em;
  transition: color 0.3s;
}
.forgot-link:hover { color: var(--gold-3); }

/* ─── BUTTONS ─── */
.btn-gold {
  width: 100%;
  padding: 1rem;
  background: var(--gold-2);
  border: none;
  color: var(--void);
  font-family: var(--display);
  font-size: 0.7rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: all 0.4s var(--ease-silk);
}
.btn-gold::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 80%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  transition: left 0.6s var(--ease-silk);
}
.btn-gold:hover {
  background: var(--gold-3);
  transform: translateY(-2px);
  box-shadow: var(--shadow-gold);
}
.btn-gold:hover::before { left: 150%; }
.btn-gold:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

/* Divider */
.auth-divider {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin: 2rem 0;
  color: rgba(248,244,237,0.2);
  font-size: 0.6rem;
  letter-spacing: 0.1em;
}
.auth-divider::before,
.auth-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(212,168,48,0.2), transparent);
}
.auth-divider span { font-family: var(--display); }

/* Social login */
.social-login {
  display: flex;
  gap: 1rem;
  justify-content: center;
}
.social-btn {
  flex: 1;
  padding: 0.8rem;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(212,168,48,0.15);
  color: rgba(248,244,237,0.6);
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
}
.social-btn:hover {
  border-color: rgba(212,168,48,0.4);
  background: rgba(212,168,48,0.05);
  color: var(--gold-3);
  transform: translateY(-2px);
}

/* Sign up link */
.signup-link {
  text-align: center;
  margin-top: 2rem;
  font-size: 0.7rem;
  color: rgba(248,244,237,0.4);
}
.signup-link a {
  color: var(--gold-2);
  text-decoration: none;
  letter-spacing: 0.05em;
  transition: color 0.3s;
}
.signup-link a:hover { color: var(--gold-3); text-decoration: underline; }

/* Message */
.message {
  background: rgba(196, 74, 44, 0.1);
  border-left: 3px solid var(--error);
  padding: 0.8rem 1rem;
  margin-bottom: 1.5rem;
  font-size: 0.7rem;
  color: #e88a6a;
  display: none;
}
.message.show { display: block; }
.message.success {
  border-left-color: var(--success);
  background: rgba(42, 138, 92, 0.1);
  color: #6ad4a0;
}

/* ─── FOOTER ─── */
.auth-footer {
  text-align: center;
  padding: 2rem;
  font-family: var(--display);
  font-size: 0.5rem;
  letter-spacing: 0.2em;
  color: rgba(248,244,237,0.15);
  position: relative;
  z-index: 1;
}

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  .nav-inner { padding: 0 2rem; }
  .auth-card { padding: 2rem 1.5rem; }
  .auth-header h1 { font-size: 1.6rem; }
  .social-login { flex-direction: column; }
  .form-options { flex-direction: column; align-items: flex-start; }
}
@media (max-width: 480px) {
  .auth-card { padding: 1.8rem 1.2rem; }
  .nav-inner { padding: 0 1.5rem; }
}
</style>
</head>
<body>

<!-- Ambient Canvas -->
<canvas id="ambient-canvas"></canvas>

<!-- Navigation -->
<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      DOLLARCHIC
      <span class="logo-tagline">Maison de Luxe</span>
    </a>
    <a href="index.html" class="nav-back">
      <i class="fas fa-arrow-left"></i> Back to Store
    </a>
  </div>
</nav>

<!-- Login Container -->
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">
        <i class="fas fa-user-circle"></i>
      </div>
      <h1>Welcome Back</h1>
      <p>Enter your credentials to access your account</p>
    </div>

    <div class="message" id="message"></div>

    <form id="login-form">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" placeholder="name@example.com" required>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="••••••••" required>
          <button type="button" class="password-toggle" id="togglePasswordBtn">
            <i class="fas fa-eye-slash"></i>
          </button>
        </div>
      </div>

      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox" id="remember">
          <span>Remember me</span>
        </label>
        <a href="#" class="forgot-link" onclick="alert('Password reset link sent to your email'); return false;">Forgot Password?</a>
      </div>

      <button type="submit" class="btn-gold" id="submit-btn">Sign In <i class="fas fa-arrow-right"></i></button>
    </form>

    <div class="auth-divider">
      <span>OR</span>
    </div>

    <div class="social-login">
      <button class="social-btn" onclick="alert('Google login coming soon')">
        <i class="fab fa-google"></i> Google
      </button>
      <button class="social-btn" onclick="alert('Apple login coming soon')">
        <i class="fab fa-apple"></i> Apple
      </button>
    </div>

    <div class="signup-link">
      Don't have an account? <a href="signup.html">Create Account</a>
    </div>
  </div>
</div>

<div class="auth-footer">
  <p>© 2024 Dollarchic's Store. All Rights Reserved.</p>
</div>

<script>
/* ═══════════ AMBIENT PARTICLE CANVAS ═══════════ */
(function() {
  const canvas = document.getElementById('ambient-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * W;
      this.y = Math.random() * H;
      this.size = Math.random() * 2.5 + 0.5;
      this.speedX = (Math.random() - 0.5) * 0.2;
      this.speedY = -Math.random() * 0.3 - 0.05;
      this.opacity = Math.random() * 0.4;
    }
    update() {
      this.x += this.speedX;
      this.y += this.speedY;
      if (this.y < -50 || this.x > W + 50 || this.x < -50) this.reset();
    }
    draw() {
      ctx.save();
      ctx.globalAlpha = this.opacity;
      const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 3);
      grad.addColorStop(0, '#f0c842');
      grad.addColorStop(0.4, '#d4a830');
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  for (let i = 0; i < 60; i++) particles.push(new Particle());

  function loop() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(loop);
  }
  loop();
})();

/* ═══════════ PASSWORD TOGGLE — FIXED ═══════════ */
const passwordInput = document.getElementById('password');
const togglePasswordBtn = document.getElementById('togglePasswordBtn');

if (togglePasswordBtn) {
  togglePasswordBtn.addEventListener('click', function() {
    const icon = togglePasswordBtn.querySelector('i');
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      icon.classList.remove('fa-eye-slash');
      icon.classList.add('fa-eye');
    } else {
      passwordInput.type = 'password';
      icon.classList.remove('fa-eye');
      icon.classList.add('fa-eye-slash');
    }
  });
}

/* ═══════════ LOGIN HANDLER WITH SUPABASE ═══════════ */
document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const remember = document.getElementById('remember').checked;
  const messageDiv = document.getElementById('message');
  const submitBtn = document.getElementById('submit-btn');
  
  // Validation
  if (!email || !password) {
    messageDiv.textContent = 'Please enter email and password';
    messageDiv.classList.add('show');
    setTimeout(() => messageDiv.classList.remove('show'), 3000);
    return;
  }
  
  // Check if Supabase is initialized
  if (typeof window.dollarchicAuth === 'undefined') {
    messageDiv.textContent = 'Supabase not initialized. Please check your connection.';
    messageDiv.classList.add('show');
    setTimeout(() => messageDiv.classList.remove('show'), 3000);
    return;
  }
  
  // Show loading state
  const originalText = submitBtn.innerHTML;
  submitBtn.innerHTML = 'Signing in... <i class="fas fa-spinner fa-spin"></i>';
  submitBtn.disabled = true;
  
  // Attempt login
  const result = await window.dollarchicAuth.signIn(email, password);
  
  if (result.success) {
    // Save to localStorage if "Remember me" is checked
    if (remember) {
      localStorage.setItem('dollarchic_remembered', email);
    } else {
      localStorage.removeItem('dollarchic_remembered');
    }
    
    // Show success message
    messageDiv.textContent = 'Login successful! Redirecting...';
    messageDiv.classList.add('show', 'success');
    
    // Redirect to homepage
    setTimeout(() => {
      window.location.href = 'scents.html';
    }, 1000);
  } else {
    // Show error message
    messageDiv.textContent = result.error || 'Invalid email or password. Please try again.';
    messageDiv.classList.add('show');
    messageDiv.classList.remove('success');
    
    // Reset button
    submitBtn.innerHTML = originalText;
    submitBtn.disabled = false;
    
    // Clear error after 3 seconds
    setTimeout(() => messageDiv.classList.remove('show'), 3000);
  }
});

/* ═══════════ AUTO-FILL REMEMBERED EMAIL ═══════════ */
const rememberedEmail = localStorage.getItem('dollarchic_remembered');
if (rememberedEmail) {
  const emailField = document.getElementById('email');
  const rememberCheckbox = document.getElementById('remember');
  if (emailField) emailField.value = rememberedEmail;
  if (rememberCheckbox) rememberCheckbox.checked = true;
}
</script>
</body>
</html>
