<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search | Dollarchic's Store</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Josefin+Sans:wght@100;200;300;400;600&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/cart.js"></script>
    
    <style>
        :root {
            --void: #020406;
            --abyss: #050a0d;
            --deep: #080f14;
            --gold-2: #d4a830;
            --gold-3: #f0c842;
            --bone: #f8f4ed;
            --serif: 'Bodoni Moda', serif;
            --display: 'Cinzel', serif;
            --sans: 'DM Sans', sans-serif;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: var(--sans);
            font-weight: 300;
            background: var(--void);
            color: var(--bone);
            min-height: 100vh;
        }
        
        /* Ambient Canvas */
        #ambient-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.6;
        }
        
        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 1.5rem 0;
            background: rgba(2,4,6,0.7);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(212,168,48,0.1);
        }
        .nav-inner {
            max-width: 1500px;
            margin: 0 auto;
            padding: 0 4rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-logo {
            font-family: var(--display);
            font-size: 1.2rem;
            letter-spacing: 0.3em;
            color: var(--bone);
            text-decoration: none;
        }
        .nav-logo::before {
            content: '✦';
            color: var(--gold-3);
            margin-right: 0.5rem;
            display: inline-block;
        }
        .nav-buttons {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .nav-back {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: rgba(248,244,237,0.7);
            text-decoration: none;
            font-size: 0.75rem;
            transition: color 0.3s, gap 0.3s;
            padding: 0.5rem 1rem;
            background: rgba(212,168,48,0.1);
            border-radius: 40px;
        }
        .nav-back:hover {
            color: var(--gold-3);
            gap: 0.8rem;
            background: rgba(212,168,48,0.2);
        }
        
        /* Auth Indicator */
        .auth-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .profile-avatar-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: rgba(212,168,48,0.1);
            border: 1px solid rgba(212,168,48,0.3);
            border-radius: 40px;
            padding: 0.3rem 0.8rem 0.3rem 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        
        .profile-avatar-btn:hover {
            background: rgba(212,168,48,0.2);
            transform: translateY(-2px);
            border-color: rgba(212,168,48,0.6);
        }
        
        .avatar-circle {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--gold-2), var(--gold-3));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .avatar-circle i {
            font-size: 0.9rem;
            color: var(--void);
        }
        
        .avatar-text {
            font-family: var(--font-sans);
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--bone);
            letter-spacing: 0.05em;
        }
        
        .logout-btn {
            background: none;
            border: 1px solid rgba(212,168,48,0.3);
            color: rgba(248,244,237,0.7);
            padding: 0.4rem 0.8rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-family: var(--font-sans);
        }
        
        .logout-btn:hover {
            border-color: rgba(212,168,48,0.8);
            color: var(--gold-3);
            transform: translateY(-1px);
        }
        
        .login-btn {
            background: var(--gold-2);
            border: none;
            color: var(--void);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-family: var(--font-sans);
        }
        
        .login-btn:hover {
            background: var(--gold-3);
            transform: translateY(-1px);
        }
        
        /* Cart Button */
        .cart-btn {
            background: none;
            border: none;
            color: rgba(248,244,237,0.7);
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            padding: 0.4rem;
            border-radius: 50%;
        }
        
        .cart-btn:hover {
            color: var(--gold-3);
            transform: translateY(-2px);
        }
        
        .cart-badge {
            position: absolute;
            top: -5px;
            right: -8px;
            background: var(--gold-2);
            color: var(--void);
            font-size: 0.55rem;
            font-weight: 600;
            min-width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Search Page Container */
        .search-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 10rem 2rem 4rem;
            position: relative;
            z-index: 1;
        }
        
        /* Search Header */
        .search-header {
            margin-bottom: 3rem;
            text-align: center;
        }
        
        .search-header h1 {
            font-family: var(--serif);
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
        }
        
        .search-header p {
            color: rgba(248,244,237,0.5);
            font-size: 0.9rem;
        }
        
        /* Search Input Area */
        .search-input-area {
            margin-bottom: 3rem;
        }
        
        .search-input-wrapper {
            position: relative;
            max-width: 700px;
            margin: 0 auto;
        }
        
        .search-input-wrapper i {
            position: absolute;
            left: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(212,168,48,0.5);
            font-size: 1.2rem;
        }
        
        .search-input-wrapper input {
            width: 100%;
            padding: 1.2rem 1.5rem 1.2rem 3.5rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212,168,48,0.2);
            border-radius: 60px;
            color: var(--bone);
            font-size: 1rem;
            font-family: var(--sans);
            outline: none;
            transition: all 0.3s ease;
        }
        
        .search-input-wrapper input:focus {
            border-color: rgba(212,168,48,0.6);
            background: rgba(255,255,255,0.08);
        }
        
        .search-input-wrapper input::placeholder {
            color: rgba(248,244,237,0.3);
        }
        
        .clear-search {
            position: absolute;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(248,244,237,0.3);
            cursor: pointer;
            font-size: 1rem;
            transition: color 0.3s ease;
        }
        
        .clear-search:hover {
            color: var(--gold-3);
        }
        
        /* Search Stats */
        .search-stats {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(212,168,48,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .results-count {
            font-size: 0.8rem;
            color: rgba(248,244,237,0.5);
        }
        
        .results-count span {
            color: var(--gold-3);
            font-weight: 600;
        }
        
        .filter-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .filter-chip {
            padding: 0.4rem 1rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(212,168,48,0.2);
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.3s ease;
        }
        
        .filter-chip.active {
            background: rgba(212,168,48,0.15);
            border-color: rgba(212,168,48,0.6);
            color: var(--gold-3);
        }
        
        .filter-chip:hover {
            background: rgba(212,168,48,0.1);
        }
        
        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }
        
        .product-card {
            background: rgba(8,9,14,0.65);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212,168,48,0.15);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
            position: relative;
        }
        
        .product-card:hover {
            transform: translateY(-10px);
            border-color: rgba(212,168,48,0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .product-image {
            position: relative;
            aspect-ratio: 1;
            overflow: hidden;
        }
        
        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }
        
        .product-card:hover .product-image img {
            transform: scale(1.08);
        }
        
        .product-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--gold-2);
            color: var(--void);
            padding: 0.25rem 0.75rem;
            border-radius: 30px;
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            z-index: 2;
        }
        
        .product-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            padding: 1.5rem;
            display: flex;
            justify-content: center;
        }
        
        .product-card:hover .product-overlay {
            opacity: 1;
        }
        
        .quick-add-btn {
            background: var(--gold-2);
            color: var(--void);
            border: none;
            padding: 0.7rem 1.2rem;
            border-radius: 40px;
            font-family: var(--font-sans);
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            transform: translateY(20px);
            opacity: 0;
        }
        
        .product-card:hover .quick-add-btn {
            transform: translateY(0);
            opacity: 1;
        }
        
        .quick-add-btn:hover {
            background: var(--gold-3);
            transform: translateY(-2px);
        }
        
        .product-info {
            padding: 1.25rem;
            text-align: center;
        }
        
        .product-category {
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--gold-2);
            margin-bottom: 0.5rem;
        }
        
        .product-name {
            font-family: var(--serif);
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 0.35rem;
        }
        
        .product-price {
            font-size: 0.85rem;
            color: var(--gold-3);
            font-weight: 500;
        }
        
        /* Loading State */
        .loading-state {
            text-align: center;
            padding: 4rem;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 2px solid rgba(210, 170, 50, 0.2);
            border-top-color: var(--gold-2);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem;
        }
        
        .empty-state i {
            font-size: 4rem;
            color: rgba(212,168,48,0.2);
            margin-bottom: 1rem;
        }
        
        .empty-state h3 {
            font-family: var(--serif);
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        
        .empty-state p {
            color: rgba(248,244,237,0.4);
            margin-bottom: 1.5rem;
        }
        
        .suggestions-title {
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold-2);
            margin-bottom: 1rem;
        }
        
        .suggestions-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
        }
        
        .suggestion-tag {
            padding: 0.5rem 1.2rem;
            background: rgba(212,168,48,0.1);
            border: 1px solid rgba(212,168,48,0.2);
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .suggestion-tag:hover {
            background: rgba(212,168,48,0.2);
            border-color: rgba(212,168,48,0.5);
            transform: translateY(-2px);
        }
        
        /* Cart Sidebar */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 400px;
            max-width: 90vw;
            height: 100vh;
            background: var(--deep);
            z-index: 2000;
            transition: right 0.4s ease;
            border-left: 1px solid rgba(212,168,48,0.1);
            display: flex;
            flex-direction: column;
        }
        
        .cart-sidebar.open {
            right: 0;
        }
        
        .cart-sidebar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--gold-2), var(--gold-3));
        }
        
        .cart-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 1999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .cart-overlay.open {
            opacity: 1;
            visibility: visible;
        }
        
        .cart-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .cart-header h3 {
            font-family: var(--serif);
            font-size: 1.3rem;
            font-weight: 400;
        }
        
        .close-cart {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: rgba(248,244,237,0.5);
            transition: all 0.3s ease;
        }
        
        .close-cart:hover {
            color: var(--gold-3);
            transform: rotate(90deg);
        }
        
        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }
        
        .empty-cart {
            text-align: center;
            padding: 2rem;
        }
        
        .empty-cart i {
            font-size: 2.5rem;
            color: rgba(212,168,48,0.2);
            margin-bottom: 1rem;
        }
        
        .cart-footer {
            padding: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        
        .cart-subtotal {
            display: flex;
            justify-content: space-between;
            font-weight: 500;
            margin-bottom: 1rem;
        }
        
        .btn-primary {
            width: 100%;
            padding: 0.8rem;
            background: var(--gold-2);
            border: none;
            color: var(--void);
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            background: var(--gold-3);
            transform: translateY(-2px);
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .nav-inner {
                padding: 0 2rem;
            }
            .search-container {
                padding: 8rem 1rem 3rem;
            }
            .search-header h1 {
                font-size: 1.8rem;
            }
            .auth-indicator .avatar-text,
            .logout-btn span {
                display: none;
            }
            .profile-avatar-btn,
            .logout-btn {
                padding: 0.4rem;
            }
            .products-grid {
                grid-template-columns: 1fr;
            }
            .nav-back span {
                display: none;
            }
            .nav-back {
                padding: 0.5rem;
            }
        }
    </style>
</head>
<body>

<canvas id="ambient-canvas"></canvas>

<!-- Navigation -->
<nav id="navbar">
    <div class="nav-inner">
        <a href="index.html" class="nav-logo">DOLLARCHIC</a>
        <div class="nav-buttons">
            <a href="index.html" class="nav-back">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <div class="auth-indicator" id="authIndicator"></div>
            <button class="cart-btn" id="cartBtn">
                <i class="fas fa-shopping-bag"></i>
                <span class="cart-badge" id="cartCount">0</span>
            </button>
        </div>
    </div>
</nav>

<!-- Search Page Container -->
<div class="search-container">
    <div class="search-header">
        <h1>Search Collection</h1>
        <p>Discover our curated selection of luxury scents and artisanal bags</p>
    </div>

    <!-- Search Input -->
    <div class="search-input-area">
        <div class="search-input-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search for fragrances, bags, accessories..." autocomplete="off">
            <button class="clear-search" id="clearSearchBtn" style="display: none;">
                <i class="fas fa-times-circle"></i>
            </button>
        </div>
    </div>

    <!-- Search Results Header -->
    <div class="search-stats" id="searchStats" style="display: none;">
        <div class="results-count">Found <span id="resultCount">0</span> results for "<span id="searchTerm">...</span>"</div>
        <div class="filter-buttons" id="filterButtons">
            <button class="filter-chip active" data-filter="all">All</button>
            <button class="filter-chip" data-filter="scent">Scents</button>
            <button class="filter-chip" data-filter="bag">Bags</button>
        </div>
    </div>

    <!-- Products Grid -->
    <div id="productsGrid" class="products-grid">
        <div class="loading-state">
            <div class="loading-spinner"></div>
            <p>Loading products...</p>
        </div>
    </div>
</div>

<!-- Cart Sidebar -->
<div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
        <h3><i class="fas fa-shopping-bag"></i> Your Bag</h3>
        <button class="close-cart" id="closeCartBtn"><i class="fas fa-times"></i></button>
    </div>
    <div class="cart-items" id="cartItems">
        <div class="empty-cart">
            <i class="fas fa-shopping-bag"></i>
            <p>Your bag is empty</p>
        </div>
    </div>
    <div class="cart-footer">
        <div class="cart-subtotal">
            <span>Subtotal</span>
            <span id="cartTotal">₦0.00</span>
        </div>
        <button class="btn-primary" onclick="location.href='checkout.html'">Checkout</button>
    </div>
</div>
<div class="cart-overlay" id="cartOverlay"></div>

<script>
    // Global variables
    let allProducts = [];  // Will store ALL products (scents AND bags)
    let allScentsData = [];
    let allBagsData = [];
    let currentUser = null;
    let isAuthenticated = false;
    let currentFilter = 'all';
    let currentSearchTerm = '';
    
    // Get URL parameters
    function getUrlParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }
    
    // ============================================
    // LOAD ALL PRODUCTS FROM SUPABASE
    // ============================================
    
    async function loadAllProducts() {
        const container = document.getElementById('productsGrid');
        
        try {
            // Wait for Supabase to be ready
            let supabaseReady = false;
            for (let i = 0; i < 30; i++) {
                if (window.dollarchicSupabase) {
                    supabaseReady = true;
                    break;
                }
                await new Promise(r => setTimeout(r, 100));
            }
            
            if (!supabaseReady) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Connection Error</h3>
                        <p>Please refresh the page</p>
                    </div>`;
                return;
            }
            
            // Fetch ALL products from the products table
            const { data, error } = await window.dollarchicSupabase
                .from('products')
                .select('*')
                .order('id', { ascending: true });
            
            if (error) throw error;
            
            if (data && data.length > 0) {
                // Store all products for search
                allProducts = data.map(product => ({
                    id: product.id,
                    name: product.name,
                    price: parseFloat(product.price),
                    image: product.image_url,
                    category: product.category === 'scent' ? (product.family || 'Fragrance') : (product.type || 'Bag'),
                    type: product.category,  // 'scent' or 'bag'
                    badge: product.badge || null
                }));
                
                // Separate for reference
                allScentsData = allProducts.filter(p => p.type === 'scent');
                allBagsData = allProducts.filter(p => p.type === 'bag');
                
                console.log(`Loaded ${allScentsData.length} scents and ${allBagsData.length} bags`);
                console.log('All products:', allProducts);
                
                // Check for search query in URL
                const searchQuery = getUrlParam('q');
                if (searchQuery) {
                    document.getElementById('searchInput').value = searchQuery;
                    performSearch(searchQuery);
                } else {
                    // Show initial state (all products)
                    displayProducts(allProducts);
                    document.getElementById('searchStats').style.display = 'none';
                }
            } else {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-box-open"></i>
                        <h3>No products found</h3>
                        <p>Check back soon for new arrivals</p>
                    </div>`;
            }
            
        } catch (error) {
            console.error('Error loading products:', error);
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h3>Error Loading Products</h3>
                    <p>Please refresh the page</p>
                </div>`;
        }
    }
    
    // ============================================
    // SEARCH FUNCTIONALITY
    // ============================================
    
    function performSearch(query) {
        currentSearchTerm = query.trim().toLowerCase();
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearSearchBtn');
        
        if (!currentSearchTerm) {
            displayProducts(allProducts);
            document.getElementById('searchStats').style.display = 'none';
            clearBtn.style.display = 'none';
            // Update URL to remove query
            const url = new URL(window.location);
            url.searchParams.delete('q');
            window.history.pushState({}, '', url);
            return;
        }
        
        clearBtn.style.display = 'flex';
        
        // Search across ALL products by name
        let results = allProducts.filter(product => 
            product.name.toLowerCase().includes(currentSearchTerm)
        );
        
        // Apply filter if not 'all'
        if (currentFilter !== 'all') {
            results = results.filter(product => product.type === currentFilter);
        }
        
        // Update search stats
        document.getElementById('resultCount').textContent = results.length;
        document.getElementById('searchTerm').textContent = query;
        document.getElementById('searchStats').style.display = 'flex';
        
        if (results.length === 0) {
            showNoResults(query);
        } else {
            displayProducts(results);
        }
        
        // Update URL without reload
        const url = new URL(window.location);
        url.searchParams.set('q', query);
        window.history.pushState({}, '', url);
    }
    
    function showNoResults(query) {
        const container = document.getElementById('productsGrid');
        
        // Generate suggestions based on similar words from ALL products
        const suggestionWords = [];
        allProducts.forEach(product => {
            const words = product.name.toLowerCase().split(' ');
            words.forEach(word => {
                if (word.length > 3 && (currentSearchTerm.includes(word) || word.includes(currentSearchTerm))) {
                    if (!suggestionWords.includes(word) && suggestionWords.length < 8) {
                        suggestionWords.push(word);
                    }
                }
            });
        });
        
        // Add category suggestions
        const categories = [...new Set(allProducts.map(p => p.category))];
        categories.forEach(cat => {
            if (cat.toLowerCase().includes(currentSearchTerm) || currentSearchTerm.includes(cat.toLowerCase())) {
                if (!suggestionWords.includes(cat)) {
                    suggestionWords.push(cat);
                }
            }
        });
        
        container.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-search"></i>
                <h3>No results found for "${escapeHtml(query)}"</h3>
                <p>Try searching with different keywords</p>
                ${suggestionWords.length > 0 ? `
                    <div style="margin-top: 2rem;">
                        <div class="suggestions-title">You might also like</div>
                        <div class="suggestions-list">
                            ${suggestionWords.slice(0, 8).map(word => `
                                <span class="suggestion-tag" onclick="searchSuggestion('${word.replace(/'/g, "\\'")}')">${escapeHtml(word)}</span>
                            `).join('')}
                        </div>
                    </div>
                ` : `
                    <div style="margin-top: 2rem;">
                        <div class="suggestions-title">Popular searches</div>
                        <div class="suggestions-list">
                            <span class="suggestion-tag" onclick="searchSuggestion('rose')">Rose</span>
                            <span class="suggestion-tag" onclick="searchSuggestion('oud')">Oud</span>
                            <span class="suggestion-tag" onclick="searchSuggestion('leather')">Leather</span>
                            <span class="suggestion-tag" onclick="searchSuggestion('tote')">Tote</span>
                            <span class="suggestion-tag" onclick="searchSuggestion('clutch')">Clutch</span>
                            <span class="suggestion-tag" onclick="searchSuggestion('sandalwood')">Sandalwood</span>
                            <span class="suggestion-tag" onclick="searchSuggestion('crossbody')">Crossbody</span>
                            <span class="suggestion-tag" onclick="searchSuggestion('floral')">Floral</span>
                        </div>
                    </div>
                `}
            </div>
        `;
    }
    
    function displayProducts(products) {
        const container = document.getElementById('productsGrid');
        
        if (products.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-box-open"></i>
                    <h3>No products found</h3>
                    <p>Try adjusting your search</p>
                </div>`;
            return;
        }
        
        container.innerHTML = products.map(product => `
            <div class="product-card" data-id="${product.id}" data-type="${product.type}">
                <div class="product-image">
                    <img src="${product.image}" alt="${product.name}" loading="lazy">
                    ${product.badge ? `<span class="product-badge">${product.badge}</span>` : ''}
                    <div class="product-overlay">
                        <button class="quick-add-btn" onclick="event.stopPropagation(); addToCartFromSearch(${product.id})">
                            <i class="fas fa-shopping-bag"></i> Add to Bag
                        </button>
                    </div>
                </div>
                <div class="product-info">
                    <div class="product-category">${escapeHtml(product.category)}</div>
                    <div class="product-name">${escapeHtml(product.name)}</div>
                    <div class="product-price">₦${product.price.toFixed(2)}</div>
                </div>
            </div>
        `).join('');
        
        // Add click handlers for product cards
        document.querySelectorAll('.product-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (!e.target.classList.contains('quick-add-btn')) {
                    const type = card.dataset.type;
                    if (type === 'scent') {
                        window.location.href = 'scents.html';
                    } else {
                        window.location.href = 'bags.html';
                    }
                }
            });
        });
    }
    
    function searchSuggestion(term) {
        const searchInput = document.getElementById('searchInput');
        searchInput.value = term;
        performSearch(term);
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // ============================================
    // CART FUNCTIONS
    // ============================================
    
    async function addToCartFromSearch(productId) {
        const product = allProducts.find(p => p.id === productId);
        if (!product) return;
        
        const productForCart = {
            id: product.id,
            name: product.name,
            price: product.price,
            image: product.image,
            category: product.category
        };
        
        if (typeof window.addToCart === 'function') {
            await window.addToCart(productForCart);
            showToast(`${product.name} added to bag`);
        } else {
            console.error('Cart.js not loaded properly');
            showToast('Cart system loading... Please try again');
        }
    }
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.style.cssText = `
            position: fixed; bottom: 30px; right: 30px; background: #080f14;
            color: white; padding: 1rem 1.5rem; border-radius: 12px;
            display: flex; align-items: center; gap: 12px; z-index: 10000;
            transform: translateX(400px); transition: transform 0.3s ease;
            border-left: 3px solid #d4a830; box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        `;
        toast.innerHTML = `<i class="fas fa-check-circle" style="color: #d4a830;"></i><span>${message}</span>`;
        document.body.appendChild(toast);
        setTimeout(() => toast.style.transform = 'translateX(0)', 10);
        setTimeout(() => {
            toast.style.transform = 'translateX(400px)';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }
    
    // ============================================
    // AUTHENTICATION
    // ============================================
    
    async function checkAuthStatus() {
        if (typeof window.dollarchicAuth !== 'undefined') {
            try {
                const result = await window.dollarchicAuth.getCurrentUser();
                if (result.success && result.isAuthenticated && result.user) {
                    isAuthenticated = true;
                    currentUser = result.user;
                }
            } catch (e) {
                console.log('Auth error:', e);
            }
            updateAuthUI();
        }
    }
    
    function updateAuthUI() {
        const container = document.getElementById('authIndicator');
        if (!container) return;
        
        if (isAuthenticated && currentUser) {
            const firstName = currentUser.user_metadata?.first_name || 
                              currentUser.email?.split('@')[0] || 
                              'Member';
            container.innerHTML = `
                <a href="profile.html" class="profile-avatar-btn">
                    <div class="avatar-circle"><i class="fas fa-user"></i></div>
                    <span class="avatar-text">${firstName}</span>
                </a>
                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span>Exit</span></button>
            `;
            document.getElementById('logoutBtn')?.addEventListener('click', handleLogout);
        } else {
            container.innerHTML = `
                <button class="login-btn" id="loginBtn"><i class="fas fa-user"></i><span>Sign In</span></button>
            `;
            document.getElementById('loginBtn')?.addEventListener('click', () => {
                window.location.href = 'login.html';
            });
        }
    }
    
    async function handleLogout() {
        if (typeof window.dollarchicAuth !== 'undefined') {
            await window.dollarchicAuth.signOut();
            window.location.href = 'index.html';
        }
    }
    
    // ============================================
    // CART UI UPDATE
    // ============================================
    
    function updateCartUI() {
        const cartCountEl = document.getElementById('cartCount');
        const cartTotalEl = document.getElementById('cartTotal');
        
        if (typeof window.getCartCount === 'function') {
            if (cartCountEl) cartCountEl.textContent = window.getCartCount();
        }
        if (typeof window.getCartTotal === 'function') {
            if (cartTotalEl) cartTotalEl.textContent = `₦${window.getCartTotal().toFixed(2)}`;
        }
    }
    
    // ============================================
    // UI INITIALIZATION
    // ============================================
    
    function initSearchEvents() {
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearSearchBtn');
        
        searchInput.addEventListener('input', (e) => {
            performSearch(e.target.value);
        });
        
        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            performSearch('');
            clearBtn.style.display = 'none';
        });
        
        // Filter buttons
        const filterBtns = document.querySelectorAll('.filter-chip');
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                if (currentSearchTerm) {
                    performSearch(currentSearchTerm);
                } else {
                    let products = [...allProducts];
                    if (currentFilter !== 'all') {
                        products = products.filter(p => p.type === currentFilter);
                    }
                    displayProducts(products);
                }
            });
        });
    }
    
    function initCartSidebar() {
        const cartBtn = document.getElementById('cartBtn');
        const cartSidebar = document.getElementById('cartSidebar');
        const cartOverlay = document.getElementById('cartOverlay');
        const closeCartBtn = document.getElementById('closeCartBtn');
        
        const openCart = () => {
            cartSidebar.classList.add('open');
            cartOverlay.classList.add('open');
            document.body.style.overflow = 'hidden';
        };
        const closeCartFn = () => {
            cartSidebar.classList.remove('open');
            cartOverlay.classList.remove('open');
            document.body.style.overflow = '';
        };
        
        cartBtn?.addEventListener('click', openCart);
        closeCartBtn?.addEventListener('click', closeCartFn);
        cartOverlay?.addEventListener('click', closeCartFn);
    }
    
    function initNavScroll() {
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            navbar.classList.toggle('scrolled', window.scrollY > 50);
        });
    }
    
    // Add scrolled class to nav
    const style = document.createElement('style');
    style.textContent = `
        nav.scrolled {
            padding: 1rem 0;
            background: rgba(2,4,6,0.95);
            backdrop-filter: blur(20px);
        }
    `;
    document.head.appendChild(style);
    
    // Make functions global
    window.searchSuggestion = searchSuggestion;
    window.addToCartFromSearch = addToCartFromSearch;
    
    // Listen for cart updates
    if (typeof window.updateCartUI === 'function') {
        const originalUpdate = window.updateCartUI;
        window.updateCartUI = function() {
            originalUpdate();
            updateCartUI();
        };
    }
    
    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
        initNavScroll();
        initCartSidebar();
        await loadAllProducts();
        await checkAuthStatus();
        initSearchEvents();
        
        // Periodic cart update
        setInterval(updateCartUI, 1000);
        updateCartUI();
    });
</script>

<!-- Ambient Canvas Animation -->
<script>
    (function() {
        const canvas = document.getElementById('ambient-canvas');
        const ctx = canvas.getContext('2d');
        let W, H, particles = [];

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * W;
                this.y = Math.random() * H;
                this.size = Math.random() * 2.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.2;
                this.speedY = -Math.random() * 0.3 - 0.05;
                this.opacity = Math.random() * 0.4;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.y < -50 || this.x > W + 50 || this.x < -50) this.reset();
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 3);
                grad.addColorStop(0, '#f0c842');
                grad.addColorStop(0.4, '#d4a830');
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        for (let i = 0; i < 60; i++) particles.push(new Particle());

        function loop() {
            ctx.clearRect(0, 0, W, H);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(loop);
        }
        loop();
    })();
</script>
