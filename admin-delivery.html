<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Delivery Settings | Dollarchic's Store</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Josefin+Sans:wght@100;200;300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    
    <style>
        :root {
            --void: #020406;
            --deep: #080f14;
            --gold-2: #d4a830;
            --gold-3: #f0c842;
            --bone: #f8f4ed;
            --success: #2a8a5c;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Josefin Sans', sans-serif;
            background: var(--void);
            color: var(--bone);
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }
        
        .admin-card {
            background: rgba(8,9,14,0.65);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212,168,48,0.15);
            border-radius: 24px;
            padding: 2rem;
        }
        
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            color: rgba(248,244,237,0.5);
            margin-bottom: 2rem;
            font-size: 0.8rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        label {
            display: block;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(212,168,48,0.6);
            margin-bottom: 0.5rem;
        }
        
        input, select {
            width: 100%;
            padding: 1rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(212,168,48,0.15);
            color: var(--bone);
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
        }
        
        input:focus, select:focus {
            border-color: rgba(212,168,48,0.5);
        }
        
        .date-preview {
            background: rgba(212,168,48,0.05);
            border-radius: 12px;
            padding: 1rem;
            margin: 1rem 0;
            text-align: center;
        }
        
        .date-preview span {
            color: var(--gold-3);
            font-size: 1.2rem;
            font-weight: 500;
        }
        
        button {
            width: 100%;
            padding: 1rem;
            background: var(--gold-2);
            border: none;
            color: var(--void);
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
        }
        
        button:hover {
            background: var(--gold-3);
            transform: translateY(-2px);
        }
        
        .status {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 12px;
            display: none;
        }
        
        .status.success {
            display: block;
            background: rgba(42,138,92,0.1);
            border: 1px solid var(--success);
            color: #6ad4a0;
        }
        
        .status.error {
            display: block;
            background: rgba(196,74,44,0.1);
            border: 1px solid #c44a2c;
            color: #e88a6a;
        }
        
        .current-settings {
            margin-bottom: 2rem;
            padding: 1rem;
            background: rgba(212,168,48,0.03);
            border-radius: 12px;
        }
        
        .current-settings p {
            margin: 0.5rem 0;
            font-size: 0.9rem;
        }
        
        hr {
            border: none;
            height: 1px;
            background: rgba(212,168,48,0.1);
            margin: 1.5rem 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="admin-card">
            <h1>Delivery Settings</h1>
            <p class="subtitle">Control the delivery date shown at checkout</p>
            
            <div class="current-settings" id="currentSettings">
                <p>Loading current settings...</p>
            </div>
            
            <hr>
            
            <form id="deliveryForm">
                <div class="form-group">
                    <label>Set Delivery Date</label>
                    <input type="date" id="deliveryDate" required>
                </div>
                
                <div class="date-preview" id="datePreview">
                    <i class="fas fa-calendar-alt"></i> 
                    <span id="previewText">Select a date</span>
                </div>
                
                <div class="form-group">
                    <label>Or Set Days from Today</label>
                    <input type="number" id="daysFromToday" placeholder="e.g., 347 for May 1, 2026" step="1">
                </div>
                
                <button type="submit">Update Delivery Date</button>
            </form>
            
            <div id="status" class="status"></div>
        </div>
    </div>
    
    <script>
        // Calculate days between two dates
        function daysBetween(date1, date2) {
            const oneDay = 24 * 60 * 60 * 1000;
            return Math.round(Math.abs((date1 - date2) / oneDay));
        }
        
        // Format date nicely
        function formatDate(date) {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            return date.toLocaleDateString('en-US', options);
        }
        
        // Load current settings
        async function loadCurrentSettings() {
            const container = document.getElementById('currentSettings');
            
            try {
                const { data, error } = await window.dollarchicSupabase
                    .from('delivery_settings')
                    .select('*')
                    .single();
                
                if (error) throw error;
                
                if (data) {
                    // Calculate the actual delivery date based on min_delivery_days
                    const deliveryDate = new Date();
                    deliveryDate.setDate(deliveryDate.getDate() + data.min_delivery_days);
                    
                    container.innerHTML = `
                        <p><strong>Current Delivery Setting:</strong></p>
                        <p>📦 Delivery Day: <strong style="color: var(--gold-3);">${formatDate(deliveryDate)}</strong></p>
                        <p>⏱️ Days from today: <strong>${data.min_delivery_days} days</strong></p>
                        <p>✂️ Cutoff Time: ${data.cutoff_time || '14:00'}</p>
                        <p>🚚 Shipping Fee: ₦${data.shipping_fee || 0}</p>
                        <p><small style="opacity: 0.5;">Last updated: ${new Date(data.updated_at).toLocaleString()}</small></p>
                    `;
                }
            } catch (error) {
                console.error('Error loading settings:', error);
                container.innerHTML = '<p>Could not load current settings</p>';
            }
        }
        
        // Update delivery date
        async function updateDeliveryDate(daysFromToday) {
            const statusDiv = document.getElementById('status');
            
            try {
                const { data, error } = await window.dollarchicSupabase
                    .from('delivery_settings')
                    .update({
                        min_delivery_days: daysFromToday,
                        updated_at: new Date()
                    })
                    .eq('id', 1);
                
                if (error) throw error;
                
                statusDiv.className = 'status success';
                statusDiv.innerHTML = `
                    <i class="fas fa-check-circle"></i> 
                    Delivery date updated successfully! The checkout page will now show ${daysFromToday} days from today.
                `;
                
                // Reload current settings
                await loadCurrentSettings();
                
                // Clear success message after 5 seconds
                setTimeout(() => {
                    statusDiv.className = 'status';
                }, 5000);
                
            } catch (error) {
                console.error('Error updating:', error);
                statusDiv.className = 'status error';
                statusDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> Error: ${error.message}`;
                
                setTimeout(() => {
                    statusDiv.className = 'status';
                }, 5000);
            }
        }
        
        // Preview delivery date
        function previewDeliveryDate(date) {
            const previewSpan = document.getElementById('previewText');
            const previewDate = new Date(date);
            previewSpan.textContent = formatDate(previewDate);
        }
        
        // Handle form submission
        document.getElementById('deliveryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const deliveryDateInput = document.getElementById('deliveryDate').value;
            const daysFromTodayInput = document.getElementById('daysFromToday').value;
            
            let daysToAdd = null;
            
            if (deliveryDateInput) {
                // Calculate days from selected date
                const selectedDate = new Date(deliveryDateInput);
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                daysToAdd = Math.ceil((selectedDate - today) / (1000 * 60 * 60 * 24));
                
                if (daysToAdd < 0) {
                    alert('Please select a future date!');
                    return;
                }
            } else if (daysFromTodayInput) {
                daysToAdd = parseInt(daysFromTodayInput);
                if (isNaN(daysToAdd) || daysToAdd < 0) {
                    alert('Please enter a valid number of days');
                    return;
                }
            } else {
                alert('Please either select a date or enter number of days');
                return;
            }
            
            await updateDeliveryDate(daysToAdd);
            
            // Clear inputs
            document.getElementById('deliveryDate').value = '';
            document.getElementById('daysFromToday').value = '';
        });
        
        // Preview when date is selected
        document.getElementById('deliveryDate').addEventListener('change', (e) => {
            if (e.target.value) {
                previewDeliveryDate(e.target.value);
            } else {
                document.getElementById('previewText').textContent = 'Select a date';
            }
        });
        
        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            // Wait for Supabase to be ready
            let retries = 0;
            while (!window.dollarchicSupabase && retries < 20) {
                await new Promise(r => setTimeout(r, 500));
                retries++;
            }
            
            await loadCurrentSettings();
        });
    </script>
</body>
</html>
